# Pre-commit hooks
# Install: pre-commit install --hook-type pre-commit --hook-type commit-msg
# Bypass: git commit --no-verify (emergencies only)

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (detect secrets)

  - repo: local
    hooks:
      - id: biome-check
        name: Biome check
        entry: npx @biomejs/biome check --write
        language: system
        types_or: [javascript, json, css]
        pass_filenames: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b # v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude_types: [image]
      - id: check-merge-conflict
      - id: check-json
        types: [json]
      - id: check-yaml
        types: [yaml]
      - id: check-toml
        types: [toml]
      - id: end-of-file-fixer
        exclude_types: [image]

  - repo: local
    hooks:
      - id: enforce-commit
        name: Enforce conventional commit
        entry: bash scripts/enforce-commit.sh
        language: system
        stages: [commit-msg]
