<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Jules Task Archiver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Jules Task Archiver</h1>
      <span class="version">v2.0</span>
    </header>

    <section class="options">
      <h2>Options</h2>
      <div class="setting-row">
        <fieldset style="border: none; padding: 0; margin: 0;">
          <legend id="opModeLabel" style="display: block; font-size: inherit; color: inherit; margin-bottom: 4px;">Operation</legend>
          <div class="segmented" id="opMode">
          <button type="button" data-value="archive" class="active" aria-pressed="true">Archive Tasks</button>
          <button type="button" data-value="suggestions" aria-pressed="false">Start Suggestions</button>
          </div>
        </fieldset>
      </div>
      <div class="setting-row">
        <fieldset style="border: none; padding: 0; margin: 0;">
          <legend id="execModeLabel" style="display: block; font-size: inherit; color: inherit; margin-bottom: 4px;">Execution Mode</legend>
          <div class="radio-group">
          <label><input type="radio" name="mode" value="dry" checked /> Dry Run</label>
          <label><input type="radio" name="mode" value="run" /> Run</label>
          </div>
        </fieldset>
      </div>
      <div class="setting-row">
        <label class="checkbox">
          <input type="checkbox" id="force" aria-describedby="forceHint" />
          Force
        </label>
        <span class="hint" id="forceHint" style="display: block; margin-left: 20px; margin-top: 2px;">Archive every task, ignoring state and matching open Pull Requests</span>
      </div>
      <div class="setting-row">
        <fieldset style="border: none; padding: 0; margin: 0;">
          <legend id="scopeLabel" style="display: block; font-size: inherit; color: inherit; margin-bottom: 4px;">Scope</legend>
          <div class="radio-group">
          <label><input type="radio" name="scope" value="current" /> Current tab</label>
          <label><input type="radio" name="scope" value="all" checked /> All Jules tabs</label>
          </div>
        </fieldset>
      </div>
    </section>

    <section class="settings">
      <h2>Settings</h2>
      <label for="ghOwner">
        GitHub Owner <span class="hint" id="ghOwnerHint">(optional, used for PR checks)</span>
        <input type="text" id="ghOwner" placeholder="your-github-username" spellcheck="false" autocomplete="username" aria-describedby="ghOwnerHint" />
      </label>
      <label for="ghToken">
        GitHub Token <span class="hint" id="ghTokenHint">(optional, for private repos)</span>
        <input
          type="password"
          id="ghToken"
          placeholder="ghp_..."
          spellcheck="false"
          autocomplete="current-password"
          aria-describedby="ghTokenHint"
        />
      </label>
    </section>

    <button type="button" id="startBtn" class="primary">Start Archiving</button>
    <button type="button" id="resetBtn" class="secondary" style="display: none">Reset</button>

    <section id="progressSection" style="display: none">
      <h2>Progress</h2>
      <div id="currentInfo" class="current-info" aria-live="polite"></div>
      <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Operation progress">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <pre id="log" class="log" aria-live="off"></pre>
    </section>

    <section id="summarySection" style="display: none">
      <h2>Summary</h2>
      <div id="summary" class="summary" aria-live="polite"></div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
