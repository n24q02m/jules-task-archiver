name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  issues:
    types: [opened, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Biome check
        run: npx @biomejs/biome check .

      - name: Validate manifest.json
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'));
            if (m.manifest_version !== 3) throw new Error('Must be Manifest V3');
            if (!m.version) throw new Error('Missing version');
            const required = ['background', 'content_scripts', 'action', 'permissions'];
            for (const k of required) {
              if (!m[k]) throw new Error('Missing: ' + k);
            }
            console.log('manifest.json valid: v' + m.version);
          "

  test:
    name: Unit Tests
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Run unit tests
        run: node --test

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request')
      && github.actor != github.repository_owner
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Parse SMTP credential
        run: |
          echo "SMTP_USER=${SMTP_CREDENTIAL%%:*}" >> $GITHUB_ENV
          echo "SMTP_PASS=${SMTP_CREDENTIAL#*:}" >> $GITHUB_ENV
        env:
          SMTP_CREDENTIAL: ${{ secrets.SMTP_CREDENTIAL }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "[${{ github.event.repository.name }}] ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}"
          to: ${{ env.SMTP_USER }}
          from: GitHub Notify <${{ env.SMTP_USER }}>
          body: |
            Event: ${{ github.event_name }}
            Actor: ${{ github.actor }}
            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}
